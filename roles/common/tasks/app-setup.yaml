  - name: create roboshop system user
    ansible.builtin.user:
      name: roboshop
      comment: roboshop system user
      system: true
      shell: /sbin/nologin
      home: /app

  # Safe to remove directory,beacause 2nd time if we run it will downliad freshly.no error if doesnot exit
  - name: remove app directory if exists
    ansible.builtin.file: 
      path: /app
      state: absent

  - name: create app directory
    ansible.builtin.file:
      state: directory
      path: /app
  
  - name: Delete {{ component }} files
    ansible.builtin.file:
      path: /tmp/{{ component }}.zip
      state: absent

  - name: download {{ component }} application
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip
      dest: /tmp/{{ component }}.zip
  
  - name: extract {{ component }} application
    ansible.builtin.unarchive:
      src: /tmp/{{ component }}.zip
      dest: /app
      remote_src: yes